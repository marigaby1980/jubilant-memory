<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS XP Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Classic Windows XP Styles */
        :root {
            --xp-blue-dark: #00309c;
            --xp-blue-medium: #0058e6;
            --xp-blue-light: #245dd7;
            --xp-taskbar-blue: #245dd7;
            --xp-start-green: #388a0e;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: "Tahoma", "Segoe UI", Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920') center/cover no-repeat;
            height: 100vh;
            width: 100vw;
            user-select: none;
            transition: background 0.3s ease;
        }

        /* Classic XP Boot Loader */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.5s;
        }

        .xp-loader-track {
            width: 160px;
            height: 14px;
            border: 2px solid #999;
            border-radius: 4px;
            padding: 1px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .xp-loader-bar {
            display: flex;
            gap: 2px;
            height: 100%;
            width: 36px;
            position: absolute;
            animation: xpProgress 1.5s linear infinite;
        }

        .xp-loader-chunk {
            width: 10px;
            height: 100%;
            background: linear-gradient(to right, #216cf2, #30a1fc 50%, #216cf2);
            border-radius: 1px;
        }

        @keyframes xpProgress {
            0% { left: -40px; }
            100% { left: 100%; }
        }

        /* Desktop Items */
        .desktop-icon {
            position: absolute;
            width: 80px;
            padding: 4px;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
            border: 1px solid transparent;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .desktop-icon svg, .desktop-icon img {
            width: 44px;
            height: 44px;
            margin-bottom: 5px;
            object-fit: contain;
            filter: drop-shadow(2px 2px 1px rgba(0,0,0,0.4));
        }

        .desktop-icon span {
            color: white;
            font-size: 11px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
            word-wrap: break-word;
            width: 100%;
            font-weight: 500;
        }

        /* XP Luna-Style Window */
        .os-window {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 700px;
            height: 520px;
            min-width: 350px;
            min-height: 250px;
            border: 3px solid #0058e6;
            border-radius: 7px 7px 0 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 3px 3px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s, opacity 0.2s;
        }

        .os-window.minimized {
            transform: scale(0.8) translateY(100vh);
            opacity: 0;
            pointer-events: none;
        }

        .os-window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 30px) !important;
            border-radius: 0;
            border: none;
        }

        .window-header {
            height: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            cursor: default;
            background: linear-gradient(to bottom, #0058e6 0%, #3a84f3 10%, #0058e6 100%);
            color: #ffffff;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            border-bottom: 1px solid #002e80;
        }

        .window-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* XP Luna Style Header Buttons */
        .xp-win-btn {
            width: 21px;
            height: 21px;
            border: 1px solid #ffffff;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.4);
        }

        .xp-win-btn.minimize {
            background: linear-gradient(135deg, #2e7efd 0%, #0048cb 100%);
        }
        .xp-win-btn.maximize {
            background: linear-gradient(135deg, #2e7efd 0%, #0048cb 100%);
        }
        .xp-win-btn.close {
            background: linear-gradient(135deg, #f07b57 0%, #d82b0e 100%);
            border-color: #d82b0e;
            font-size: 11px;
        }
        .xp-win-btn:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }

        .window-content {
            flex: 1;
            background: #ffffff;
            position: relative;
            overflow: auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* Prevent frame interactions when dragging */
        .dragging iframe, .dragging canvas, .dragging textarea {
            pointer-events: none;
        }

        /* Windows XP Start Menu */
        #start-menu {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 420px;
            height: 520px;
            border-radius: 5px 5px 0 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.5);
            z-index: 9999;
            border: 3px solid #0058e6;
            background: #245dd7;
        }

        #start-menu.active {
            opacity: 1;
            pointer-events: all;
        }

        /* XP Taskbar */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #245dd7 0%, #0e36a4 100%);
            border-top: 1px solid #1a4291;
            z-index: 10000;
        }

        .taskbar-center {
            display: flex;
            gap: 4px;
            align-items: center;
            flex: 1;
            height: 100%;
            padding-left: 4px;
        }

        /* XP Start Button */
        #start-btn {
            height: 100%;
            padding: 0 16px;
            background: linear-gradient(to bottom, #62b61a 0%, #388a0e 100%);
            border-right: 1px solid #2a6806;
            box-shadow: inset 1px 1px 2px #a4f454, 2px 0 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 0 10px 10px 0;
            transition: brightness 0.1s;
        }

        #start-btn:hover {
            filter: brightness(1.1);
        }

        #start-btn span {
            color: white;
            font-family: "Tahoma", sans-serif;
            font-weight: bold;
            font-style: italic;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* XP Taskbar Button */
        .xp-task-btn {
            background: linear-gradient(to bottom, #3c7fb1 0%, #1a5482 100%);
            border: 1px solid #123e60;
            border-radius: 3px;
            color: white;
            height: 22px;
            padding: 0 10px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 120px;
            cursor: default;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.3);
        }

        .xp-task-btn.active {
            background: #1a5482;
            box-shadow: inset -1px -1px 1px rgba(255,255,255,0.2), inset 1px 1px 3px rgba(0,0,0,0.5);
        }

        .xp-task-btn svg {
            width: 14px;
            height: 14px;
        }

        .system-tray {
            background: linear-gradient(to bottom, #0c8aef 0%, #0059b2 100%);
            border-left: 1px solid #002e80;
            height: 100%;
            padding: 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            box-shadow: inset 2px 0 4px rgba(0,0,0,0.2);
        }

        /* Custom XP Scrollbars */
        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-left: 1px solid #d3d3d3; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to right, #cfdfef, #9ebfdc); border: 2px solid #f1f1f1; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(to right, #a0c0e0, #7ea3c8); }
    </style>
</head>
<body class="light-mode" id="os-body">

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="flex flex-col items-center select-none">
            <!-- Vintage Style Text Logo -->
            <div class="text-center font-sans tracking-tight mb-4">
                <span class="text-3xl font-extrabold text-white">Microsoft</span><br>
                <span class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-red-500 to-yellow-500">Windows</span>
                <span class="text-4xl font-light text-red-500 italic">XP</span>
            </div>
            <div class="text-[10px] tracking-wider text-[#00a3f4] font-bold mb-10">PROFESSIONAL</div>
            
            <!-- Animated Loading Bar -->
            <div class="xp-loader-track">
                <div class="xp-loader-bar">
                    <div class="xp-loader-chunk"></div>
                    <div class="xp-loader-chunk"></div>
                    <div class="xp-loader-chunk"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Desktop Area -->
    <div id="desktop" class="absolute inset-0" style="height: calc(100vh - 30px);">
        <!-- Icons injected here by JS -->
    </div>

    <!-- Windows Container -->
    <div id="windows-container" class="absolute inset-0 pointer-events-none" style="height: calc(100vh - 30px);">
        <!-- Windows injected here -->
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="text-white flex flex-col font-sans select-none overflow-hidden">
        <!-- XP Start Header -->
        <div class="h-16 bg-gradient-to-b from-[#0058e6] to-[#245dd7] flex items-center px-4 border-b-2 border-[#1a4291] gap-3">
            <div class="w-11 h-11 border-2 border-white rounded-md shadow-md overflow-hidden bg-white flex items-center justify-center">
                <i class="fa-solid fa-chess-knight text-blue-700 text-3xl"></i>
            </div>
            <div class="font-bold text-shadow-md text-sm">Guest User</div>
        </div>
        
        <!-- Two Column Content Panel -->
        <div class="flex-1 flex bg-[#ffffff]">
            <!-- Left Program Pane (Light Side) -->
            <div class="w-7/12 p-2 flex flex-col gap-1 border-r border-[#d3d3d3]">
                <div class="text-[10px] text-gray-400 font-bold px-1.5 mb-1">PROGRAMS</div>
                <div id="start-pane-left" class="flex flex-col gap-0.5 overflow-y-auto max-h-[350px]">
                    <!-- Program list loaded by JS -->
                </div>
            </div>

            <!-- Right Folder/System Pane (Blue Side) -->
            <div class="w-5/12 bg-[#d3e5fa] p-2 flex flex-col gap-2 border-l border-white">
                <div class="flex flex-col gap-1 text-[#002e80] text-xs">
                    <div onclick="openApp('explorer')" class="flex items-center gap-2 hover:bg-[#316ac5] hover:text-white p-1.5 rounded cursor-pointer font-bold">
                        <i class="fa-solid fa-folder text-yellow-600"></i> My Documents
                    </div>
                    <div onclick="openApp('paint')" class="flex items-center gap-2 hover:bg-[#316ac5] hover:text-white p-1.5 rounded cursor-pointer font-bold">
                        <i class="fa-solid fa-images text-indigo-700"></i> My Pictures
                    </div>
                    <hr class="border-[#b4d0f0] my-1">
                    <div onclick="openApp('settings')" class="flex items-center gap-2 hover:bg-[#316ac5] hover:text-white p-1.5 rounded cursor-pointer">
                        <i class="fa-solid fa-sliders text-blue-800"></i> Control Panel
                    </div>
                    <div onclick="openApp('terminal')" class="flex items-center gap-2 hover:bg-[#316ac5] hover:text-white p-1.5 rounded cursor-pointer">
                        <i class="fa-solid fa-rectangle-terminal text-green-700"></i> Run...
                    </div>
                    <div onclick="openApp('taskmgr')" class="flex items-center gap-2 hover:bg-[#316ac5] hover:text-white p-1.5 rounded cursor-pointer">
                        <i class="fa-solid fa-microchip text-slate-700"></i> Task Manager
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Actions Bar -->
        <div class="h-12 bg-gradient-to-b from-[#245dd7] to-[#0058e6] border-t border-[#1a4291] flex justify-end items-center px-4 gap-4">
            <button class="flex items-center gap-1.5 text-xs text-white hover:underline hover:brightness-115" onclick="alert('Log Off sequence initialised.')">
                <i class="fa-solid fa-key-skeleton bg-yellow-500 text-black px-1.5 py-0.5 rounded"></i> Log Off
            </button>
            <button class="flex items-center gap-1.5 text-xs text-white hover:underline hover:brightness-115" onclick="alert('System Safe To Turn Off')">
                <i class="fa-solid fa-power-off bg-red-600 text-white px-1.5 py-0.5 rounded"></i> Turn Off Computer
            </button>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()">
            <i class="fa-brands fa-windows text-white text-lg drop-shadow-md"></i>
            <span>start</span>
        </div>

        <div class="taskbar-center" id="taskbar-center">
            <!-- Active/minimized tasks will inject here as tabs -->
        </div>

        <div class="system-tray">
            <i class="fa-solid fa-volume-high"></i>
            <i class="fa-solid fa-computer"></i>
            <span id="clock-time">12:00 PM</span>
        </div>
    </div>


    <!-- ================= APP TEMPLATES ================= -->

    <!-- App Creator Template (App Studio) -->
    <template id="app-creator-template">
        <div class="p-6 h-full flex flex-col bg-[#f1f1f1] text-gray-800 font-sans">
            <div class="mb-4 flex items-center gap-3 border-b border-[#ccc] pb-3">
                <div class="bg-gradient-to-b from-blue-600 to-blue-800 text-white p-2 rounded shadow">
                    <i class="fa-solid fa-box-open text-xl"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-blue-900">App Wizard Installer</h2>
                    <p class="text-xs text-gray-600">Register custom HTML programs into your start directory.</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto space-y-4 pr-2 text-xs">
                <div>
                    <label class="block font-bold mb-1">Enter Program Name:</label>
                    <input type="text" id="setup-app-name" placeholder="e.g. Vintage Adventure" class="w-full px-3 py-1.5 border border-[#999] rounded bg-white outline-none focus:border-blue-700">
                </div>

                <div>
                    <label class="block font-bold mb-1">App Icon (PNG, JPEG, SVG):</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#ccc] rounded cursor-pointer hover:bg-gray-200 transition">
                            <div class="flex flex-col items-center justify-center pt-2">
                                <i class="fa-solid fa-image text-2xl text-gray-500 mb-1"></i>
                                <p class="text-xs text-gray-600"><span class="font-bold">Select Icon Asset</span></p>
                            </div>
                            <input type="file" id="setup-app-icon" accept="image/*" class="hidden" onchange="previewIcon(this)" />
                        </label>
                    </div>
                    <div id="icon-preview-container" class="hidden mt-2 flex items-center gap-2 bg-white p-1.5 rounded border border-[#ccc]">
                        <img id="icon-preview" src="" alt="Preview" class="w-8 h-8 object-cover rounded">
                        <span id="icon-filename" class="text-xs truncate">filename.png</span>
                    </div>
                </div>

                <div>
                    <label class="block font-bold mb-1">Package Content (.html file):</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#ccc] rounded cursor-pointer hover:bg-gray-200 transition">
                            <div class="flex flex-col items-center justify-center pt-2">
                                <i class="fa-brands fa-html5 text-2xl text-orange-500 mb-1"></i>
                                <p class="text-xs text-gray-600"><span class="font-bold">Select Program Source</span></p>
                            </div>
                            <input type="file" id="setup-app-file" accept=".html" class="hidden" onchange="previewFile(this)" />
                        </label>
                    </div>
                    <div id="file-preview-container" class="hidden mt-2 flex items-center gap-2 bg-white p-1.5 rounded border border-[#ccc]">
                        <i class="fa-solid fa-file-code text-blue-500 text-lg"></i>
                        <span id="file-filename" class="text-xs truncate">index.html</span>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-t border-[#ccc] flex justify-end">
                <button id="install-btn" onclick="OS.installCustomApp()" class="bg-[#388a0e] hover:brightness-110 text-white font-bold py-1.5 px-5 rounded border border-[#2a6806] shadow text-xs">
                    Install Program
                </button>
            </div>
        </div>
    </template>

    <!-- Internet Explorer Template -->
    <template id="browser-template">
        <div class="flex flex-col h-full bg-[#f1f1f1] w-full font-sans text-xs">
            <!-- Classic Toolbar Layout -->
            <div class="flex items-center gap-1.5 p-1 border-b border-[#ccc] bg-[#eae9e1]">
                <button class="px-2 py-1 rounded hover:bg-white border border-transparent hover:border-[#aaa] transition flex items-center gap-1 text-[11px]"><i class="fa-solid fa-arrow-left text-blue-600 text-[13px]"></i> Back</button>
                <button class="px-2 py-1 rounded hover:bg-white border border-transparent hover:border-[#aaa] transition flex items-center gap-1 text-[11px]"><i class="fa-solid fa-arrow-right text-blue-600 text-[13px]"></i> Forward</button>
                <div class="h-4 border-r border-[#999] mx-1"></div>
                <input type="text" id="browser-url-input" class="flex-1 px-2 py-1 border border-[#999] bg-white outline-none focus:border-blue-700" value="https://example.com" onkeydown="if(event.key === 'Enter') loadBrowserUrl()">
                <label class="flex items-center gap-1 ml-2 cursor-pointer text-gray-700" title="Attempts to bypass X-Frame Restrictions.">
                    <input type="checkbox" id="browser-proxy-toggle" class="cursor-pointer"> Proxy Mode
                </label>
                <button onclick="loadBrowserUrl()" class="px-3 py-1 bg-[#3c7fb1] hover:brightness-110 text-white rounded font-bold">Go</button>
            </div>
            <iframe id="browser-iframe" src="https://example.com" class="flex-1 w-full bg-white border-none" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </template>

    <!-- CodeTabs Template -->
    <template id="codetabs-template">
        <div class="flex flex-col h-full w-full bg-[#1e1e1e] text-white font-sans text-xs">
            <div class="flex bg-[#2d2d2d] border-b border-black items-center p-1 gap-1">
                <input type="text" id="codetabs-url" class="bg-[#1e1e1e] text-white px-2 py-1 flex-1 border border-[#444] rounded outline-none text-xs ml-2" placeholder="Enter URL to fetch source code...">
                <button onclick="fetchCodeTabsUrl()" class="px-3 py-1 bg-[#316ac5] hover:brightness-110 text-white rounded font-bold whitespace-nowrap">Fetch HTML</button>
                <div class="h-4 border-r border-[#444] mx-1"></div>
                <button onclick="runCodeTabs()" class="px-4 py-1 bg-green-700 hover:brightness-110 text-white rounded font-bold whitespace-nowrap">Execute</button>
            </div>
            <div class="flex flex-1 overflow-hidden">
                <textarea id="codetabs-editor" class="w-1/2 h-full bg-[#1e1e1e] text-[#d4d4d4] p-3 font-mono text-xs resize-none outline-none border-r border-[#333]" spellcheck="false">
<!-- Windows XP CodeTabs Playground -->
<style>
  body {
    background: #eae9e1;
    font-family: 'Tahoma', sans-serif;
    padding: 20px;
    margin: 0;
  }
  .xp-box {
    background: white;
    border: 2px solid #0058e6;
    border-radius: 4px;
    padding: 15px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
  }
</style>
<div class="xp-box">
  <h2>Welcome to CodeTabs Sandbox!</h2>
  <p>Input code, tweak the HTML/CSS tags, and witness interactive previews directly on the right side window.</p>
</div>
                </textarea>
                <div class="w-1/2 h-full bg-white relative">
                    <iframe id="codetabs-preview" class="w-full h-full border-none" sandbox="allow-scripts allow-modals"></iframe>
                </div>
            </div>
        </div>
    </template>

    <!-- File Explorer Template (My Documents) -->
    <template id="explorer-template">
        <div class="flex flex-col h-full bg-white text-gray-800 font-sans text-xs">
            <div class="flex items-center gap-2 p-1.5 border-b border-[#ccc] bg-[#eae9e1]">
                <button onclick="explorerGoBack()" class="p-1 px-2 border border-[#999] rounded bg-white hover:bg-gray-100 flex items-center gap-1"><i class="fa-solid fa-arrow-left text-blue-600"></i> Back</button>
                <span class="text-xs text-gray-700 font-mono flex-1 px-2 py-1 bg-white rounded border border-[#999]" id="explorer-current-path">/C:</span>
                <button onclick="explorerCreateNewFile()" class="p-1 px-3 bg-[#388a0e] hover:brightness-115 text-white rounded font-bold flex items-center gap-1"><i class="fa-solid fa-plus"></i> New Text</button>
            </div>
            <div id="explorer-files-list" class="flex-1 p-3 grid grid-cols-4 gap-4 overflow-y-auto content-start">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </template>

    <!-- Control Panel Settings -->
    <template id="settings-template">
        <div class="p-6 h-full flex flex-col bg-[#f1f1f1] text-gray-800 font-sans text-xs overflow-y-auto">
            <div class="mb-4 flex items-center gap-3 border-b border-[#ccc] pb-3">
                <div class="bg-blue-700 text-white p-2 rounded shadow">
                    <i class="fa-solid fa-palette text-lg"></i>
                </div>
                <div>
                    <h2 class="text-base font-bold text-blue-900">Display Properties</h2>
                    <p class="text-xs text-gray-600">Personalize desktop theme assets.</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>

        const desktopEl = document.getElementById('desktop');

        const windowsContainer = document.getElementById('windows-container');
        const startMenu = document.getElementById('start-menu');

        // --- Init Function ---
        function initOS() {
            setTimeout(() => {
                const bootScreen = document.getElementById('boot-screen');
                if (bootScreen) {
                    bootScreen.style.opacity = '0';
                    setTimeout(() => bootScreen.remove(), 500);
                }
            }, 3000);

            renderDesktop();
            renderStartMenu();
            updateClock();
            setInterval(updateClock, 1000);
            startCPULoop();

            // Handle global mouse inputs for menu closures
            document.getElementById('os-body').addEventListener('mousedown', (e) => {
                if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) {
                    startMenu.classList.remove('active');
                }
            });
        }

        // --- Render Desktop ---
        function renderDesktop() {
            desktopEl.innerHTML = '';
            let col = 0;
            let row = 0;
            const iconHeight = 90;
            const iconWidth = 90;

            Object.values(OS.apps).forEach(app => {
                const div = document.createElement('div');
                div.className = 'desktop-icon';
                div.dataset.appid = app.id;
                
                if (app.x === undefined || app.y === undefined) {
                    app.x = 12 + (col * iconWidth);
                    app.y = 12 + (row * iconHeight);
                    row++;
                    if (row > Math.floor((window.innerHeight - 80) / iconHeight)) {
                        row = 0;
                        col++;
                    }
                }
                div.style.left = app.x + 'px';
                div.style.top = app.y + 'px';

                div.onmousedown = (e) => startIconDrag(e, div, app);
                div.onclick = () => {
                    if (!window.isIconDragging) openApp(app.id); 
                };
                
                let iconHTML = '';
                if (app.iconType === 'svg') {
                    iconHTML = app.iconSvg;
                } else if (app.iconType === 'fa') {
                    iconHTML = `<i class="${app.iconClass}"></i>`;
                } else if (app.iconType === 'img') {
                    iconHTML = `<img src="${app.iconUrl}" alt="${app.name}">`;
                }

                div.innerHTML = `
                    ${iconHTML}
                    <span>${app.name}</span>
                `;
                desktopEl.appendChild(div);
            });
            updateTaskbar();
        }

        function renderStartMenu() {
            startLeftPane.innerHTML = '';
            Object.values(OS.apps).forEach(app => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 p-1 rounded hover:bg-[#316ac5] hover:text-white cursor-pointer text-gray-800 text-xs font-semibold';
                item.onclick = () => { openApp(app.id); startMenu.classList.remove('active'); };

                let iconHTML = '';
                if (app.iconType === 'svg') {
                    // Start menu needs a smaller viewport version
                    iconHTML = `<div class="w-5 h-5 flex items-center justify-center">${app.iconSvg}</div>`;
                } else if (app.iconType === 'fa') {
                    iconHTML = `<i class="${app.iconClass} text-base"></i>`;
                } else if (app.iconType === 'img') {
                    iconHTML = `<img src="${app.iconUrl}" class="w-5 h-5 object-contain">`;
                }

                item.innerHTML = `
                    ${iconHTML}
                    <span class="truncate">${app.name}</span>
                `;
                startLeftPane.appendChild(item);
            });
        }

        function updateTaskbar() {
            taskbarCenterEl.innerHTML = '';
            const openAppIds = [...new Set(Object.values(OS.windows).map(w => w.appId))];

            openAppIds.forEach(appId => {
                const app = OS.apps[appId];
                if (!app) return;

                const isActive = OS.windowOrder[OS.windowOrder.length - 1] === appId && !OS.windows[appId].minimized;

                const btn = document.createElement('div');
                btn.className = `xp-task-btn truncate ${isActive ? 'active' : ''}`;
                btn.onclick = () => {
                    const win = OS.windows[appId];
                    if (isActive) {
                        minimizeWindow(appId);
                    } else {
                        if (win.minimized) restoreWindow(appId);
                        bringToFront(appId);
                    }
                };

                let iconHTML = '';
                if (app.iconType === 'svg') {
                    iconHTML = `<div class="w-3.5 h-3.5 flex items-center justify-center">${app.iconSvg}</div>`;
                } else if (app.iconType === 'fa') {
                    iconHTML = `<i class="${app.iconClass}"></i>`;
                } else if (app.iconType === 'img') {
                    iconHTML = `<img src="${app.iconUrl}" class="w-3.5 h-3.5">`;
                }

                btn.innerHTML = `
                    ${iconHTML}
                    <span class="truncate text-white">${app.name}</span>
                `;
                taskbarCenterEl.appendChild(btn);
            });

        // --- Window Execution ---
        function openApp(appId, param = null) {
            const app = OS.apps[appId];
            if (!app) return;

            if (OS.windows[appId]) {
                if (OS.windows[appId].minimized) restoreWindow(appId);
                bringToFront(appId);
                if(appId === 'notepad' && param) {
                    loadNotepadFile(param);
                }
                return;
            }

            const winEl = document.createElement('div');
            winEl.className = 'os-window pointer-events-auto';
            winEl.id = `window-${appId}`;
            
            const offset = (Object.keys(OS.windows).length % 5) * 25 + 40;
            winEl.style.top = `${offset}px`;
            winEl.style.left = `${offset}px`;

            let contentHTML = '';
            if (app.useTemplate) {
                const tmpl = document.getElementById(app.useTemplate);
                contentHTML = tmpl.innerHTML;
            } else if (app.content) {
                contentHTML = `<iframe srcdoc="${app.content.replace(/"/g, '&quot;')}" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>`;
            }

            let iconHTML = '';
            if (app.iconType === 'svg') {
                iconHTML = `<div class="w-4 h-4 flex items-center justify-center">${app.iconSvg}</div>`;
            } else if (app.iconType === 'fa') {
                iconHTML = `<i class="${app.iconClass} text-[14px]"></i>`;
            } else if (app.iconType === 'img') {
                iconHTML = `<img src="${app.iconUrl}" class="w-4.5 h-4.5">`;
            }

            winEl.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${appId}')">
                    <div class="flex items-center gap-1.5 truncate">
                        ${iconHTML}
                        <span>${app.name}</span>
                    </div>
                    <div class="window-controls">
                        <div class="xp-win-btn minimize" onclick="minimizeWindow('${appId}'); event.stopPropagation();">_</div>
                        <div class="xp-win-btn maximize" onclick="maximizeWindow('${appId}'); event.stopPropagation();">❑</div>
                        <div class="xp-win-btn close" onclick="closeWindow('${appId}'); event.stopPropagation();">X</div>
                    </div>
                </div>
                <div class="window-content flex-1 h-full relative">
                    ${contentHTML}
                </div>
            `;

            winEl.addEventListener('mousedown', () => bringToFront(appId));
            windowsContainer.appendChild(winEl);

            OS.windows[appId] = {
                appId: appId,
                element: winEl,
                minimized: false,
                maximized: false
            };

            bringToFront(appId);

            // Frame Delay Load
            setTimeout(() => {
                if(appId === 'explorer') renderExplorerFolder();
                if(appId === 'paint') initPaintCanvas();
                if(appId === 'snake') initSnakeGame();
                if(appId === 'notepad' && param) loadNotepadFile(param);
                if(appId === 'taskmgr') renderTaskManagerList();
                if(appId === 'codetabs') runCodeTabs();
            }, 120);
        }

        function closeWindow(appId) {
            if (OS.windows[appId]) {
                windowsContainer.removeChild(OS.windows[appId].element);
                delete OS.windows[appId];
                OS.windowOrder = OS.windowOrder.filter(id => id !== appId);
                updateTaskbar();
                renderTaskManagerList();
            }
        }

        function minimizeWindow(appId) {
            const win = OS.windows[appId];
            if (win) {
                win.minimized = true;
                win.element.classList.add('minimized');
                updateTaskbar();
            }
        }

        // ... rest of original system functions (drag handlers, calculator, terminal, clock, paint, snake) ...
        function restoreWindow(appId) {
            const win = OS.windows[appId];
            if (win) {
                win.minimized = false;
                win.element.classList.remove('minimized');
                bringToFront(appId);
            }
        }

        function maximizeWindow(appId) {
            const win = OS.windows[appId];
            if (win) {
                if (win.maximized) {
                    win.element.classList.remove('maximized');
                    win.maximized = false;
                } else {
                    win.element.classList.add('maximized');
                    win.maximized = true;
                }
            }
        }

        function bringToFront(appId) {
            OS.highestZ++;
            const win = OS.windows[appId];
            if (win) {
                win.element.style.zIndex = OS.highestZ;
                OS.windowOrder = OS.windowOrder.filter(id => id !== appId);
                OS.windowOrder.push(appId);
                updateTaskbar();
            }

        // --- Desktop Dragging Utilities ---
        let draggedAppIcon = null;
        let draggedAppRef = null;
        let iconOffsetX = 0;
        let iconOffsetY = 0;
        let hasMovedIcon = false;
        window.isIconDragging = false;

        function startIconDrag(e, el, appRef) {
            draggedAppIcon = el;
            draggedAppRef = appRef;
            hasMovedIcon = false;
            window.isIconDragging = false;

            const rect = el.getBoundingClientRect();
            iconOffsetX = e.clientX - rect.left;
            iconOffsetY = e.clientY - rect.top;

            document.addEventListener('mousemove', doIconDrag);
            document.addEventListener('mouseup', stopIconDrag);
        }

        function doIconDrag(e) {
            if (!draggedAppIcon) return;
            hasMovedIcon = true;
            window.isIconDragging = true;
            
            let newLeft = e.clientX - iconOffsetX;
            let newTop = e.clientY - iconOffsetY;

            if (newLeft < 0) newLeft = 0;
            if (newTop < 0) newTop = 0;
            if (newLeft > window.innerWidth - 80) newLeft = window.innerWidth - 80;
            if (newTop > window.innerHeight - 90) newTop = window.innerHeight - 90;

            draggedAppIcon.style.left = `${newLeft}px`;
            draggedAppIcon.style.top = `${newTop}px`;
        }

        function stopIconDrag() {
            if (draggedAppIcon && hasMovedIcon && draggedAppRef) {
                draggedAppRef.x = parseInt(draggedAppIcon.style.left);
                draggedAppRef.y = parseInt(draggedAppIcon.style.top);
            }
            draggedAppIcon = null;
            document.removeEventListener('mousemove', doIconDrag);
            document.removeEventListener('mouseup', stopIconDrag);
            setTimeout(() => { window.isIconDragging = false; }, 50);
        }

        // --- Window Dragging Utilities ---
        let draggedWindow = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        function startDrag(e, appId) {
            const win = OS.windows[appId];
            if (!win || win.maximized) return;

            draggedWindow = win.element;
            const rect = draggedWindow.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;

            draggedWindow.classList.add('dragging');
            bringToFront(appId);

            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function doDrag(e) {
            if (!draggedWindow) return;
            let newLeft = e.clientX - dragOffsetX;
            let newTop = e.clientY - dragOffsetY;

            if (newTop < 0) newTop = 0;
            if (newTop > window.innerHeight - 30 - 24) newTop = window.innerHeight - 30 - 24;

            draggedWindow.style.left = `${newLeft}px`;
            draggedWindow.style.top = `${newTop}px`;
        }

        function stopDrag() {
            if (draggedWindow) {
                draggedWindow.classList.remove('dragging');
                draggedWindow = null;
            }
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        function fetchCodeTabsUrl() {
            const input = document.getElementById('codetabs-url');
            const editor = document.getElementById('codetabs-editor');
            if(!input || !editor) return;

            let url = input.value.trim();
            if(!url) { alert('Please enter a valid URL'); return; }
            if(!url.startsWith('http')) url = 'https://' + url;
            input.value = url;

            editor.value = '<!-- Accessing target host... Please wait -->';
            
            fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Access failed');
                })
                .then(data => {
                    let html = data.contents;
                    if(html.includes('<head>')) {
                        html = html.replace('<head>', `<head>\n  <base href="${url}">`);
                    } else {
                        html = `<head><base href="${url}"></head>\n` + html;
                    }
                    editor.value = html;
                    runCodeTabs();
                })
                .catch(() => {
                    editor.value = '<!-- Connection could not be bridged. Target host may be blocking proxy requests. -->';
                });
        }

            if(!input || !iframe) return;

            let url = input.value.trim();

            input.value = url;

            if (proxyToggle && proxyToggle.checked) {
                iframe.srcdoc = `<html><head><style>body{color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#222;}</style></head><body><h2>Loading via Proxy...</h2></body></html>`;
                fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
                    .then(response => {
                        if (response.ok) return response.json();
                        throw new Error('Proxy error');
                    })
                    .then(data => {
                        let html = data.contents;
                        if(html.includes('<head>')) {
                            html = html.replace('<head>', `<head><base href="${url}"></head>\n`);
                        } else {
                            html = `<head><base href="${url}"></head>\n` + html;

        // Canvas Painter
        let paintDrawing = false;
        let paintCtx = null;
        let paintCanvas = null;

        function initPaintCanvas() {
            paintCanvas = document.getElementById('paint-canvas');
            const container = document.getElementById('paint-container');
            if(!paintCanvas || !container) return;

            paintCanvas.width = container.clientWidth;
            paintCanvas.height = container.clientHeight;

            paintCtx = paintCanvas.getContext('2d');
            paintCtx.lineCap = 'round';
            paintCtx.lineJoin = 'round';

            paintCanvas.onmousedown = (e) => {
                paintDrawing = true;
                paintCtx.beginPath();
                const coords = getCanvasCoords(e);
                paintCtx.moveTo(coords.x, coords.y);
            };

            paintCanvas.onmousemove = (e) => {
                if(!paintDrawing) return;
                const coords = getCanvasCoords(e);
                paintCtx.lineTo(coords.x, coords.y);
                paintCtx.strokeStyle = document.getElementById('paint-color').value;
                paintCtx.lineWidth = document.getElementById('paint-size').value;
                paintCtx.stroke();
            };

            paintCanvas.onmouseup = () => paintDrawing = false;
            paintCanvas.onmouseleave = () => paintDrawing = false;
        }

        function getCanvasCoords(e) {
            const rect = paintCanvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function clearPaintCanvas() {
            if(paintCtx && paintCanvas) {
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
            }
        }

        // Calculator Input Engine
        let calcValue = '0';
        function calcPress(btn) {
            const display = document.getElementById('calc-display');
            if (!display) return;
            
            if (btn === 'C') calcValue = '0';
            else if (btn === '<') calcValue = calcValue.length > 1 ? calcValue.slice(0, -1) : '0';
            else if (btn === '=') {
                try { 
                    let safeEval = calcValue.replace(/×/g, '*').replace(/÷/g, '/');
                    calcValue = String(eval(safeEval)); 
                } 
                catch(e) { calcValue = 'Error'; }
            }
            else {
                if (calcValue === '0' && btn !== '.') calcValue = btn;
                else if (calcValue === 'Error') calcValue = btn;
                else calcValue += btn;
            }
            display.value = calcValue;
        }

        function handleTerminalCommand(e) {
            if(e.key !== 'Enter') return;
            const input = e.target;
            const commandLine = input.value.trim();

            const outputEl = document.getElementById('terminal-output');
            if(!outputEl) return;

            const cmdEcho = document.createElement('div');

            const args = commandLine.split(' ');
            const primary = args[0].toLowerCase();

            const resp = document.createElement('div');
            resp.className = 'text-green-400 whitespace-pre-wrap';

            switch(primary) {
                case '':
                    break;
                case 'help':
                    resp.textContent = `Vintage CLI Commands list:
  help     - Displays console command guide.
  neofetch - Outputs OS information specs.
  ls       - Lists current target files.
  cat      - Renders file source text. Usage: cat filename.txt
  clear    - Flushes buffer.`;
                    break;
                case 'neofetch':
                    resp.textContent = `
    _     _      Windows XP Professional Web Edition
   (o\\___/o)     Kernel Build: 5.1.2600 Service Pack 3
    (  V  )      Processor: Virtual x86 Instruction Set
    -======-     Virtual Partition System: FAT32`;
                    break;
                case 'ls':
                    resp.textContent = `Volume FAT32 C:\\\n` + Object.keys(virtualFS['C:']).map(f => `  ${f}`).join('\n');
                    break;
                case 'cat':
                    const filename = args[1];
                    if(!filename) {
                        resp.textContent = "Error: Input file parameter. Usage: cat welcome.txt";
                    } else if(virtualFS['C:'][filename]) {
                        resp.textContent = virtualFS['C:'][filename];
                    } else {
                        resp.textContent = `Error: Cannot find file target named "${filename}".`;
                    }
                    break;
                case 'clear':
                    outputEl.innerHTML = '';

                default:

            outputEl.appendChild(resp);
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // Classic Retro Snake Game
        let snake = [];
        let food = {};
        let snakeDir = 'right';
        let snakeGameInterval = null;
        let snakeScore = 0;
        let snakeHighScore = 0;

        function initSnakeGame() {
            const canvas = document.getElementById('snake-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');

            snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
            food = {x: 10, y: 10};
            snakeDir = 'right';
            snakeScore = 0;
            document.getElementById('snake-score').textContent = snakeScore;

            if(snakeGameInterval) clearInterval(snakeGameInterval);
            drawSnakeBoard(ctx);

            canvas.onclick = () => {
                clearInterval(snakeGameInterval);
                snakeGameInterval = setInterval(() => runSnakeTick(ctx), 120);
            };

            window.addEventListener('keydown', handleSnakeKeys);
        }

        function handleSnakeKeys(e) {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            if(e.key === 'ArrowUp' && snakeDir !== 'down') snakeDir = 'up';
            if(e.key === 'ArrowDown' && snakeDir !== 'up') snakeDir = 'down';
            if(e.key === 'ArrowLeft' && snakeDir !== 'right') snakeDir = 'left';
            if(e.key === 'ArrowRight' && snakeDir !== 'left') snakeDir = 'right';
        }

        function runSnakeTick(ctx) {
            let head = Object.assign({}, snake[0]);
            if(snakeDir === 'up') head.y--;
            if(snakeDir === 'down') head.y++;
            if(snakeDir === 'left') head.x--;
            if(snakeDir === 'right') head.x++;

            if(head.x < 0 || head.y < 0 || head.x >= 14 || head.y >= 14) {
                gameOverSnake();
                return;
            }

            for(let cell of snake) {
                if(cell.x === head.x && cell.y === head.y) {
                    gameOverSnake();
                    return;
                }
            }

            snake.unshift(head);

            if(head.x === food.x && head.y === food.y) {
                snakeScore += 10;
                document.getElementById('snake-score').textContent = snakeScore;
                if(snakeScore > snakeHighScore) {
                    snakeHighScore = snakeScore;
                    document.getElementById('snake-highscore').textContent = snakeHighScore;
                }
                food = {
                    x: Math.floor(Math.random() * 14),
                    y: Math.floor(Math.random() * 14)
                };
            } else {
                snake.pop();
            }

            drawSnakeBoard(ctx);
        }

        function drawSnakeBoard(ctx) {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, 280, 280);

            ctx.fillStyle = '#4caf50';
            snake.forEach(cell => {
                ctx.fillRect(cell.x * 20, cell.y * 20, 18, 18);
            });

            ctx.fillStyle = '#f44336';
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);
        }

        function gameOverSnake() {
            clearInterval(snakeGameInterval);
            alert(`Thread Error! Final game score: ${snakeScore}`);
            initSnakeGame();
        }

                iconUrl: pendingAppIcon,
                isSystem: false,
                content: pendingAppContent
            };

            renderDesktop();
            renderStartMenu();

            nameInput.value = '';
            pendingAppIcon = null;
            pendingAppContent = null;
            document.getElementById('icon-preview-container').classList.add('hidden');
            document.getElementById('file-preview-container').classList.add('hidden');
            document.getElementById('setup-app-icon').value = '';
            document.getElementById('setup-app-file').value = '';

            const btn = document.getElementById('install-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Setup Successful!';
            btn.classList.add('bg-green-600');
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
            }, 2000);
        };

        // Vintage Custom Style Popup alert overrides
        window.alert = function(msg) {
            const modal = document.createElement('div');
            modal.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 p-4 rounded bg-[#f1f1f1] border-2 border-[#0058e6] shadow-2xl z-[99999] text-gray-800 text-center flex flex-col gap-3 min-w-[280px] font-sans text-xs';
            modal.innerHTML = `
                <div class="flex items-center gap-2 border-b border-gray-300 pb-1 text-blue-900 font-bold justify-between">
                    <span>System Message</span>
                    <span class="cursor-pointer font-black text-red-600" onclick="this.parentElement.parentElement.remove()">X</span>
                </div>
                <p class="text-xs font-semibold py-2 text-left">${msg}</p>
                <div class="flex justify-end pt-1">
                    <button class="bg-[#3c7fb1] border border-blue-900 hover:brightness-110 text-white px-5 py-1 font-bold rounded" onclick="this.parentElement.parentElement.remove()">OK</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.onload = initOS;
    </script>
</body>
</html>
